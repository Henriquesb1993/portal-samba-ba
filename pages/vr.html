<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Portal Sambaíba - Gestão de VR</title>

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
</head>
<body>
<div class="layout">
  <aside class="sb">
    <div class="sb-logo">
      <img src="../assets/logo.png" alt="Sambaíba">
      <div class="sb-brand">
        <b>Sambaíba</b>
        <small>Viagens Nimer</small>
      </div>
    </div>

    <div class="sb-sec">Operação</div>
    <a class="sb-item" data-page="horas.html" href="./horas.html"><span class="ico">⏱</span><span class="sb-txt">Horas Realizadas</span></a>
    <a class="sb-item" data-page="viagens.html" href="./viagens.html"><span class="ico">🚌</span><span class="sb-txt">Viagens</span></a>
    <a class="sb-item" data-page="vr.html" href="./vr.html"><span class="ico">🍽</span><span class="sb-txt">Gestão de VR</span></a>

    <div class="sb-foot">
      <div class="sb-user">
        <div class="sb-av">A</div>
        <div class="sb-utxt">
          <b>Administrador</b>
          <small>Administrador</small>
        </div>
      </div>
      <button class="btn-sair-sb">Sair</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1>GESTÃO DE VALE REFEIÇÃO — RH</h1>
      <div class="top-btns">
        <div class="badge-live">● AO VIVO</div>
      </div>
    </div>

    <div class="content">
      <div class="card" style="margin-bottom:12px">
        <button class="btn-consultar" id="btnCarregarVR">🔄 CARREGAR DADOS DE EXEMPLO</button>
        <div id="vrLog" style="font-family:monospace;font-size:10px;margin-top:8px;color:#8fb0de">Aguardando...</div>
      </div>

      <div class="kpis" style="grid-template-columns:repeat(4,1fr)">
        <div class="kpi"><div class="kpi-lbl">Total FT</div><div class="kpi-val" id="kFT">—</div></div>
        <div class="kpi"><div class="kpi-lbl">Total CT</div><div class="kpi-val" id="kCT">—</div></div>
        <div class="kpi"><div class="kpi-lbl">Reclamação</div><div class="kpi-val" id="kRec">—</div></div>
        <div class="kpi"><div class="kpi-lbl">Total Ev.</div><div class="kpi-val" id="kTot" style="color:#87ffd0">—</div></div>
      </div>

      <div class="card">
        <table class="tbl">
          <thead><tr><th>RE</th><th>Nome</th><th>Função</th><th>FT</th><th>CT</th><th>Total</th></tr></thead>
          <tbody id="vrTbody">
            <tr><td colspan="6" style="text-align:center">Nenhum registro. Clique em carregar.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="../js/core/navigation.js"></script>
<script src="../js/modules/vr.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Portal Sambaíba - Viagens</title>

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
</head>
<body>
<div class="layout">
  <aside class="sb">
    <div class="sb-logo">
      <img src="../assets/logo.png" alt="Sambaíba">
      <div class="sb-brand">
        <b>Sambaíba</b>
        <small>Viagens Nimer</small>
      </div>
    </div>

    <div class="sb-sec">Operação</div>
    <a class="sb-item" data-page="horas.html" href="./horas.html"><span class="ico">⏱</span><span class="sb-txt">Horas Realizadas</span></a>
    <a class="sb-item" data-page="viagens.html" href="./viagens.html"><span class="ico">🚌</span><span class="sb-txt">Viagens</span></a>
    <a class="sb-item" data-page="vr.html" href="./vr.html"><span class="ico">🍽</span><span class="sb-txt">Gestão de VR</span></a>

    <div class="sb-foot">
      <div class="sb-user">
        <div class="sb-av">A</div>
        <div class="sb-utxt">
          <b>Administrador</b>
          <small>Administrador</small>
        </div>
      </div>
      <button class="btn-sair-sb">Sair</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1>MÓDULO DE VIAGENS <span>(Em construção)</span></h1>
      <div class="top-btns">
        <div class="badge-live">● AO VIVO</div>
      </div>
    </div>

    <div class="content">
      <div class="card">
        <div class="card-title">Viagens</div>
        <p style="color:#7a9cc8;font-size:12px">Estrutura pronta e isolada para evolução do módulo de viagens.</p>
      </div>
    </div>
  </main>
</div>

<script src="../js/core/navigation.js"></script>
<script src="../js/modules/viagens.js"></script>
</body>
</html>

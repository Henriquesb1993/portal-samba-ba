<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal Sambaíba — Permissões de Menu</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <script src="../js/auth.js"></script>
  <script src="../js/auth-guard.js"></script>
  <style>
    .content { flex:1; overflow-y:auto; padding:16px; }
    .perm-infobar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; padding:10px 16px; background:#09172c; border-bottom:1px solid #173256; font-size:11px; color:#5a8ab0; }
    .perm-badge { padding:3px 10px; border-radius:12px; font-size:10px; font-weight:800; }
    .pb-5 { background:rgba(246,88,88,.12);  color:#ff7070;  border:1px solid rgba(246,88,88,.3); }
    .pb-4 { background:rgba(246,166,35,.1);  color:#f6a623;  border:1px solid rgba(246,166,35,.3); }
    .pb-3 { background:rgba(61,126,245,.1);  color:#3d7ef5;  border:1px solid rgba(61,126,245,.3); }
    .pb-2 { background:rgba(0,212,255,.08);  color:#00d4ff;  border:1px solid rgba(0,212,255,.2); }
    .pb-1 { background:rgba(122,156,200,.1); color:#7a9cc8;  border:1px solid rgba(122,156,200,.2); }
    .perm-card { background:#111f3a; border:1px solid #1f3860; border-radius:10px; overflow:hidden; margin-bottom:16px; }
    .perm-section-hdr { display:flex; align-items:center; gap:8px; padding:8px 14px; background:#0c1d36; border-bottom:1px solid #1f3860; font-size:10px; font-weight:800; color:#5a8ab0; text-transform:uppercase; letter-spacing:.5px; }
    .perm-tbl { width:100%; border-collapse:collapse; }
    .perm-tbl thead th { padding:9px 14px; background:#080f1e; color:#5a8ab0; font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; border-bottom:1px solid #1f3860; text-align:left; }
    .perm-tbl thead th:not(:first-child) { text-align:center; width:80px; }
    .perm-tbl tbody tr { border-bottom:1px solid rgba(31,56,96,.35); transition:background .1s; }
    .perm-tbl tbody tr:hover { background:rgba(61,126,245,.03); }
    .perm-tbl td { padding:10px 14px; vertical-align:middle; }
    .perm-tbl td:not(:first-child) { text-align:center; }
    .menu-ico   { font-size:15px; margin-right:7px; }
    .menu-label { font-size:12px; font-weight:700; color:#eaf2ff; }
    .menu-sub   { font-size:10px; color:#3a6a8a; margin-top:1px; }
    .perm-chk { position:relative; display:inline-flex; align-items:center; justify-content:center; }
    .perm-chk input[type=checkbox] { appearance:none; width:20px; height:20px; border-radius:5px; border:2px solid #1f3860; background:#091628; cursor:pointer; transition:all .15s; position:relative; }
    .perm-chk input[type=checkbox]:checked { background:#19d46e; border-color:#19d46e; }
    .perm-chk input[type=checkbox]:checked::after { content:'✓'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#07162d; font-size:12px; font-weight:900; line-height:1; }
    .perm-chk input[type=checkbox]:disabled { background:rgba(61,126,245,.2); border-color:#3d7ef5; cursor:not-allowed; }
    .perm-chk input[type=checkbox]:disabled:checked { background:rgba(61,126,245,.3); border-color:#3d7ef5; }
    .perm-chk input[type=checkbox]:disabled::after { color:#3d7ef5; }
    .perm-actions { display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
    .btn-save-all { height:34px; padding:0 20px; background:linear-gradient(135deg,#19d46e,#0eac58); color:#07162d; border:none; border-radius:7px; font-size:12px; font-weight:900; cursor:pointer; transition:transform .15s; box-shadow:0 4px 14px rgba(25,212,110,.25); }
    .btn-save-all:hover { transform:translateY(-1px); }
    .btn-reset-all { height:34px; padding:0 16px; background:rgba(246,88,88,.1); color:#f65858; border:1px solid rgba(246,88,88,.3); border-radius:7px; font-size:12px; font-weight:700; cursor:pointer; }
    .perm-info { font-size:10px; color:#3a6a8a; margin-left:auto; }
    .th-5 { color:#ff7070 !important; } .th-4 { color:#f6a623 !important; } .th-3 { color:#3d7ef5 !important; } .th-2 { color:#00d4ff !important; } .th-1 { color:#7a9cc8 !important; }
    .toast { position:fixed; bottom:20px; right:20px; z-index:999; background:#19d46e; color:#07162d; padding:10px 18px; border-radius:8px; font-size:12px; font-weight:800; box-shadow:0 4px 16px rgba(0,0,0,.4); transform:translateY(60px); opacity:0; transition:transform .3s, opacity .3s; }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast.err { background:#f65858; color:#fff; }
    .admin-note { display:inline-flex; align-items:center; gap:6px; background:rgba(61,126,245,.1); border:1px solid rgba(61,126,245,.3); border-radius:7px; padding:6px 12px; font-size:11px; color:#3d7ef5; margin-bottom:14px; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sb" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <h1>🛡 PERMISSÕES DE MENU <span>(Controle de Acesso por Perfil)</span></h1>
      <div class="top-btns">
        <div class="badge-live" style="border-color:#a855f7;color:#a855f7;background:rgba(168,85,247,.08);">● CONFIGURAÇÃO</div>
      </div>
    </div>
    <div class="perm-infobar">
      <span>Perfis:</span>
      <span class="perm-badge pb-5">5 — ADMIN</span>
      <span class="perm-badge pb-4">4 — GERENTE</span>
      <span class="perm-badge pb-3">3 — SUPERVISOR</span>
      <span class="perm-badge pb-2">2 — OPERADOR</span>
      <span class="perm-badge pb-1">1 — VISUALIZAÇÃO</span>
    </div>
    <div class="content">
      <div class="admin-note">
        ℹ️ <b>ADMIN (nível 5)</b> sempre tem acesso a todos os menus, independente das permissões abaixo.
      </div>
      <div class="perm-actions">
        <button class="btn-save-all" onclick="PM.salvarTudo()">💾 Salvar Todas as Permissões</button>
        <button class="btn-reset-all" onclick="PM.resetarTudo()">↩ Restaurar Padrão</button>
        <span class="perm-info">* Marque os níveis que podem acessar cada menu</span>
      </div>
      <div id="permGrid"></div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
// ── PM: Permissões de Menu — namespace global ──
const PM = (() => {
  const MENUS  = AUTH.MENUS_DEFAULT;
  const PERFIS = { 1:'VISUAL.', 2:'OPERADOR', 3:'SUPERV.', 4:'GERENTE', 5:'ADMIN' };
  const NIVEIS = [1, 2, 3, 4, 5];

  function renderGrid() {
    const perms = AUTH.getPerms();
    const sections = {};
    MENUS.forEach(m => {
      if (!sections[m.section]) sections[m.section] = [];
      sections[m.section].push(m);
    });

    const container = document.getElementById('permGrid');
    container.innerHTML = '';

    Object.entries(sections).forEach(([sec, items]) => {
      const card = document.createElement('div');
      card.className = 'perm-card';
      card.innerHTML = `
        <div class="perm-section-hdr">
          <span style="color:#eaf2ff;">${sec}</span>
          <span style="color:#3a6a8a;">(${items.length} menu${items.length > 1 ? 's' : ''})</span>
        </div>
        <table class="perm-tbl">
          <thead>
            <tr>
              <th>Menu / Tela</th>
              ${NIVEIS.map(n => `<th class="th-${n}">Nível ${n}<br><small>${PERFIS[n]}</small></th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${items.map(m => {
              const allowed = perms[m.id] || [];
              return `
                <tr>
                  <td>
                    <span class="menu-ico">${m.ico}</span>
                    <span class="menu-label">${m.label}</span>
                    <div class="menu-sub">${m.href !== '#' ? m.href : 'Em desenvolvimento'}</div>
                  </td>
                  ${NIVEIS.map(n => {
                    const isAdmin = n === 5;
                    const checked = isAdmin || allowed.includes(n);
                    return `
                      <td>
                        <div class="perm-chk">
                          <input type="checkbox"
                            id="perm_${m.id}_${n}"
                            data-menu="${m.id}"
                            data-nivel="${n}"
                            ${checked ? 'checked' : ''}
                            ${isAdmin ? 'disabled title="ADMIN sempre tem acesso"' : ''}>
                        </div>
                      </td>`;
                  }).join('')}
                </tr>`;
            }).join('')}
          </tbody>
        </table>`;
      container.appendChild(card);
    });
  }

  function salvarTudo() {
    try {
      const perms = {};
      MENUS.forEach(m => {
        perms[m.id] = [];
        NIVEIS.forEach(n => {
          if (n === 5) {
            perms[m.id].push(n); // ADMIN sempre tem acesso
          } else {
            const chk = document.getElementById('perm_' + m.id + '_' + n);
            if (chk && chk.checked) {
              perms[m.id].push(n);
            }
          }
        });
      });
      AUTH.savePerms(perms);
      showToast('✅ Permissões salvas com sucesso!');
    } catch(e) {
      showToast('Erro ao salvar permissões: ' + e.message, true);
    }
  }

  function resetarTudo() {
    if (!confirm('Restaurar permissões para o padrão? Menus Admin ficarão apenas para ADMIN.')) return;
    const perms = {};
    MENUS.forEach(m => {
      if (m.id === 'usuarios' || m.id === 'permissoes') {
        perms[m.id] = [5];
      } else {
        perms[m.id] = [1, 2, 3, 4, 5];
      }
    });
    AUTH.savePerms(perms);
    renderGrid();
    showToast('Permissões restauradas ao padrão.');
  }

  function showToast(msg, err = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (err ? ' err' : '');
    void t.offsetWidth;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function init() {
    const session = AUTH.getSession();
    if (!session || session.perfil < 5) {
      const first = AUTH.getMenusForUser().find(m => m.href && m.href !== '#')?.href || 'horas.html';
      window.location.href = first;
      return;
    }
    renderGrid();
  }

  return { salvarTudo, resetarTudo, init };
})();

document.addEventListener('DOMContentLoaded', () => PM.init());
</script>
</body>
</html>

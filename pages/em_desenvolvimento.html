<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <title>Portal Sambaíba — Em Desenvolvimento</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <script src="../js/theme.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/auth-guard.js"></script>
  <style>
    .dev-center {
      flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column;
      gap:18px; text-align:center; padding:40px;
    }
    .dev-icon { font-size:64px; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.05);opacity:.8} }
    .dev-title { font-size:26px; font-weight:900; color:var(--text); letter-spacing:-.5px; }
    .dev-sub { font-size:14px; color:#5a8ab0; max-width:420px; line-height:1.7; }
    .dev-badge {
      display:inline-flex; align-items:center; gap:8px;
      background:rgba(246,166,35,.1); border:1px solid rgba(246,166,35,.3);
      border-radius:20px; padding:8px 20px; font-size:12px; font-weight:800; color:var(--warning);
    }
    .dev-dot { width:8px; height:8px; border-radius:50%; background:var(--warning); animation: blink 1s step-start infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .dev-progress {
      width:300px; height:6px; background:var(--border); border-radius:3px; overflow:hidden;
    }
    .dev-bar {
      height:100%; width:0%; background:linear-gradient(90deg,#3d7ef5,#a855f7);
      border-radius:3px; animation:loading 3s ease-in-out infinite alternate;
    }
    @keyframes loading { from{width:20%} to{width:85%} }
    .dev-eta {
      font-size:11px; color:#3a6a8a; margin-top:-8px;
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sb" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <h1 id="pageTitle">🔧 EM DESENVOLVIMENTO <span>(Em breve disponível)</span></h1>
      <div class="top-btns">
        <div class="theme-toggle" id="themeToggle" title="Alternar tema">
          <span class="theme-toggle-label" id="themeLabel">Acender luz</span>
          <div class="theme-toggle-track">
            <div class="theme-toggle-thumb">
              <span class="theme-icon-dark">&#127769;</span>
              <span class="theme-icon-light">&#9728;&#65039;</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="dev-center">
      <div class="dev-icon">🚧</div>
      <div class="dev-badge">
        <div class="dev-dot"></div>
        EM DESENVOLVIMENTO
      </div>
      <div class="dev-title">Módulo em construção</div>
      <div class="dev-sub">
        Este módulo está sendo desenvolvido e estará disponível em breve.<br>
        Nossa equipe está trabalhando para trazer a melhor experiência possível.
      </div>
      <div class="dev-progress">
        <div class="dev-bar"></div>
      </div>
      <div class="dev-eta">Desenvolvimento em andamento...</div>
    </div>
  </main>
</div>
</body>
</html>
